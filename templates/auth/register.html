{% extends 'base.html' %}
{% block title %}Register{% endblock %}

{% block content %}
<div class="container">
    <div class="row justify-content-center">
        <div class="col-md-6 col-lg-5">
            <div class="card shadow border-0 mt-4">
                <div class="card-body p-4">
                    <div class="text-center mb-4">
                        <i class="bi bi-person-plus-fill display-4 text-success"></i>
                        <h3 class="fw-bold mt-2">Create Account</h3>
                        <p class="text-muted small">Register to participate in Sports Day 2026</p>
                    </div>

                    <form method="POST" action="{{ url_for('register') }}" novalidate>
                        <div class="mb-3">
                            <label class="form-label fw-semibold" for="name">Full Name</label>
                            <div class="input-group">
                                <span class="input-group-text"><i class="bi bi-person"></i></span>
                                <input type="text" class="form-control" id="name" name="name"
                                       value="{{ name or '' }}" placeholder="Muhammad Ali" required>
                            </div>
                        </div>
                        <div class="mb-3">
                            <label class="form-label fw-semibold" for="email">Email Address</label>
                            <div class="input-group">
                                <span class="input-group-text"><i class="bi bi-envelope"></i></span>
                                <input type="email" class="form-control" id="email" name="email"
                                       value="{{ email or '' }}" placeholder="you@example.com" required>
                            </div>
                        </div>
                        <div class="mb-3">
                            <label class="form-label fw-semibold" for="phone">Phone Number</label>
                            <div class="input-group">
                                <span class="input-group-text"><i class="bi bi-phone"></i></span>
                                <input type="text" class="form-control" id="phone" name="phone"
                                       value="{{ phone or '' }}" placeholder="03XXXXXXXXX" required>
                            </div>
                            <div class="form-text">Format: 03XXXXXXXXX (Pakistani number)</div>
                        </div>
                        <div class="mb-3">
                            <label class="form-label fw-semibold" for="password">Password</label>
                            <div class="input-group">
                                <span class="input-group-text"><i class="bi bi-lock"></i></span>
                                <input type="password" class="form-control" id="password" name="password"
                                       placeholder="Minimum 6 characters" required>
                            </div>
                        </div>
                        <div class="mb-4">
                            <label class="form-label fw-semibold" for="confirm_password">Confirm Password</label>
                            <div class="input-group">
                                <span class="input-group-text"><i class="bi bi-lock-fill"></i></span>
                                <input type="password" class="form-control" id="confirm_password"
                                       name="confirm_password" placeholder="Repeat your password" required>
                            </div>
                        </div>
                        <button type="submit" class="btn btn-success w-100 py-2 fw-bold">
                            <i class="bi bi-person-check me-2"></i>Create Account
                        </button>
                    </form>

                    <hr class="my-3">
                    <p class="text-center text-muted small mb-0">
                        Already have an account?
                        <a href="{{ url_for('login') }}" class="text-primary fw-semibold">Login here</a>
                    </p>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}

{% extends 'base.html' %}
{% block title %}Login{% endblock %}

{% block content %}
<div class="container">
    <div class="row justify-content-center">
        <div class="col-md-5 col-lg-4">
            <div class="card shadow border-0 mt-4">
                <div class="card-body p-4">
                    <div class="text-center mb-4">
                        <i class="bi bi-person-circle display-4 text-primary"></i>
                        <h3 class="fw-bold mt-2">Welcome Back</h3>
                        <p class="text-muted small">Sign in to your Sports Day account</p>
                    </div>

                    <form method="POST" action="{{ url_for('login') }}" novalidate>
                        <div class="mb-3">
                            <label class="form-label fw-semibold" for="email">Email Address</label>
                            <div class="input-group">
                                <span class="input-group-text"><i class="bi bi-envelope"></i></span>
                                <input type="email" class="form-control" id="email" name="email"
                                       value="{{ email or '' }}" placeholder="you@example.com" required autofocus>
                            </div>
                        </div>
                        <div class="mb-4">
                            <label class="form-label fw-semibold" for="password">Password</label>
                            <div class="input-group">
                                <span class="input-group-text"><i class="bi bi-lock"></i></span>
                                <input type="password" class="form-control" id="password" name="password"
                                       placeholder="Your password" required>
                            </div>
                        </div>
                        <button type="submit" class="btn btn-primary w-100 py-2 fw-bold">
                            <i class="bi bi-box-arrow-in-right me-2"></i>Login
                        </button>
                    </form>

                    <hr class="my-3">
                    <p class="text-center text-muted small mb-0">
                        Don't have an account?
                        <a href="{{ url_for('register') }}" class="text-primary fw-semibold">Register here</a>
                    </p>
                </div>
            </div>

            <!-- Demo credentials -->
            <div class="card border-0 bg-light mt-3">
                <div class="card-body py-2 px-3">
                    <p class="small mb-1 text-muted fw-semibold"><i class="bi bi-info-circle me-1"></i>Demo Credentials</p>
                    <p class="small mb-0 text-muted">Admin: <code>admin@sportsday.edu</code> / <code>admin123</code></p>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}

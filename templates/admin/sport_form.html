{% extends 'base.html' %}
{% block title %}{{ action }} Sport{% endblock %}

{% block content %}
<div class="container">
    <nav aria-label="breadcrumb" class="mb-3">
        <ol class="breadcrumb">
            <li class="breadcrumb-item"><a href="{{ url_for('admin_sports') }}">Manage Sports</a></li>
            <li class="breadcrumb-item active">{{ action }} Sport</li>
        </ol>
    </nav>

    <div class="row justify-content-center">
        <div class="col-lg-8">
            <div class="card border-0 shadow">
                <div class="card-header bg-primary text-white py-3">
                    <h4 class="mb-0 fw-bold">
                        <i class="bi bi-{% if action == 'Add' %}plus-circle{% else %}pencil{% endif %}-fill me-2"></i>
                        {{ action }} Sport
                    </h4>
                </div>
                <div class="card-body p-4">
                    <form method="POST" novalidate>
                        <div class="row g-3">
                            <div class="col-md-8">
                                <label class="form-label fw-semibold" for="name">
                                    Sport Name <span class="text-danger">*</span>
                                </label>
                                <input type="text" class="form-control" id="name" name="name"
                                       value="{{ sport.get('name', '') }}"
                                       placeholder="e.g. Cricket" required>
                            </div>
                            <div class="col-md-4">
                                <label class="form-label fw-semibold" for="fee">
                                    Fee (PKR) <span class="text-danger">*</span>
                                </label>
                                <div class="input-group">
                                    <span class="input-group-text"><i class="bi bi-currency-rupee"></i></span>
                                    <input type="number" class="form-control" id="fee" name="fee"
                                           value="{{ sport.get('fee', 0) }}"
                                           min="0" step="50" required>
                                </div>
                            </div>
                            <div class="col-12">
                                <label class="form-label fw-semibold" for="description">Description</label>
                                <input type="text" class="form-control" id="description" name="description"
                                       value="{{ sport.get('description', '') }}"
                                       placeholder="Brief description of the sport">
                            </div>
                            <div class="col-12">
                                <label class="form-label fw-semibold" for="rules">Rules & Regulations</label>
                                <textarea class="form-control" id="rules" name="rules"
                                          rows="6" placeholder="Enter rules, one per line...">{{ sport.get('rules', '') }}</textarea>
                                <div class="form-text">You can use numbered lines (1. Rule one, 2. Rule two...)</div>
                            </div>
                            <div class="col-md-4">
                                <label class="form-label fw-semibold" for="max_players">
                                    Max Players <span class="text-danger">*</span>
                                </label>
                                <input type="number" class="form-control" id="max_players" name="max_players"
                                       value="{{ sport.get('max_players', 20) }}"
                                       min="1" required>
                            </div>
                            <div class="col-md-8">
                                <label class="form-label fw-semibold" for="venue">Venue</label>
                                <div class="input-group">
                                    <span class="input-group-text"><i class="bi bi-geo-alt"></i></span>
                                    <input type="text" class="form-control" id="venue" name="venue"
                                           value="{{ sport.get('venue', '') }}"
                                           placeholder="e.g. Main Ground, Block A">
                                </div>
                            </div>
                            <div class="col-md-4">
                                <label class="form-label fw-semibold" for="event_date">Event Date</label>
                                <input type="date" class="form-control" id="event_date" name="event_date"
                                       value="{{ sport.get('event_date', '') }}">
                            </div>
                        </div>

                        <hr class="my-4">
                        <div class="d-flex gap-2">
                            <button type="submit" class="btn btn-primary px-4 fw-bold">
                                <i class="bi bi-check-lg me-1"></i>{{ action }} Sport
                            </button>
                            <a href="{{ url_for('admin_sports') }}" class="btn btn-outline-secondary px-4">
                                <i class="bi bi-x-lg me-1"></i>Cancel
                            </a>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
